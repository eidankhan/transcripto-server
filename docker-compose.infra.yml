version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: transcripto-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_LOGGING_COLLECTOR: "on"
      POSTGRES_LOG_DESTINATION: "stderr"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./logs/db:/var/log/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 2s
      retries: 15
      start_period: 5s

  redis:
    image: redis:7.0-alpine
    container_name: transcripto-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --logfile /data/redis.log
    volumes:
      - redis_data:/data
      - ./logs/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      retries: 15
      start_period: 5s

volumes:
  pg_data:
  redis_data: