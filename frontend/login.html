<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Transcripto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .auth-card {
            max-width: 400px;
            margin: 80px auto;
            padding: 2rem;
            border-radius: 12px;
            background: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .navbar-brand {
            letter-spacing: 1px;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Transcripto</a>
        </div>
    </nav>

    <main class="container">
        <div class="auth-card">
            <header class="text-center mb-4">
                <h1 class="h3 fw-bold text-dark">Welcome Back</h1>
                <p class="text-muted small">Sign in to manage your transcripts</p>
            </header>

            <div id="login-alert" class="alert alert-danger d-none small"></div>

            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label small fw-bold">Password</label>
                        <a href="forgot-password.html" class="small text-decoration-none text-primary">Forgot?</a>
                    </div>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary w-100 py-2 fw-bold">
                    Sign In
                </button>
            </form>

            <footer class="text-center mt-4 pt-3 border-top">
                <p class="small text-muted mb-0">
                    New to Transcripto? <a href="signup.html" class="text-decoration-none fw-bold">Create Account</a>
                </p>
            </footer>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/js/services/auth.js"></script>
    <script src="assets/js/controllers/login.js"></script>
</body>

</html>
