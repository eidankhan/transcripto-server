events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Redirect HTTP to HTTPS for all domains
    server {
        listen 80;
        server_name transcripto.dev www.transcripto.dev api.transcripto.dev;
        return 301 https://$host$request_uri;
    }

    # --- 1. Frontend (transcripto.dev) ---
    server {
        listen 443 ssl;
        server_name transcripto.dev www.transcripto.dev;

        ssl_certificate     /etc/ssl/transcripto/fullchain.crt;
        ssl_certificate_key /etc/ssl/transcripto/private.key;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Route for the Dashboard
        location /dashboard {
            root /usr/share/nginx/html;
            try_files /dashboard.html =404;
        }

        # CUSTOM 404 CONFIG
        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # --- 2. Backend API (api.transcripto.dev) ---
    server {
        listen 443 ssl;
        server_name api.transcripto.dev;

        ssl_certificate     /etc/ssl/transcripto/fullchain.crt;
        ssl_certificate_key /etc/ssl/transcripto/private.key;

        location / {
            # Proxying to the container name defined in docker-compose
            proxy_pass http://transcripto_server:8000/; 
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_read_timeout 90s;
        }
    }
}
