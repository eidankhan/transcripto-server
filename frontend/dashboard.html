<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard | Transcripto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Transcripto</a>
            <div class="ms-auto">
                <button id="logout-btn" class="btn btn-outline-danger btn-sm rounded-pill px-3">Logout</button>
            </div>
        </div>
    </nav>
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12">

                <div class="text-center my-5">
                    <h1 class="fw-bold mb-3">Transcripto</h1>
                    <div class="input-group input-group-lg shadow-sm mx-auto"
                        style="max-width: 700px; border-radius: 50px; overflow: hidden;">
                        <input type="text" id="video-id" class="form-control border-0 ps-4"
                            placeholder="Paste YouTube link here...">
                        <button class="btn btn-primary px-4 fw-bold" id="fetch-btn">Extract</button>
                    </div>
                </div>

                <div id="result-workspace" class="card border-0 shadow-lg d-none" style="border-radius: 20px;">
                    <div class="card-header bg-white border-bottom-0 pt-4 px-4">
                        <ul class="nav nav-pills" id="transcriptTabs" role="tablist">
                            <li class="nav-item">
                                <button class="nav-link active fw-bold me-2" id="plain-tab" data-bs-toggle="pill"
                                    data-bs-target="#plain-view">
                                    Clean Transcript
                                </button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link fw-bold" id="timestamp-tab" data-bs-toggle="pill"
                                    data-bs-target="#timestamp-view">
                                    Video Timestamps
                                </button>
                            </li>
                        </ul>
                    </div>

                    <div class="card-body p-4">
                        <div class="tab-content">
                            <div class="tab-pane fade show active" id="plain-view">
                                <div id="transcript-output" class="transcript-display"></div>
                            </div>
                            <div class="tab-pane fade" id="timestamp-view">
                                <div id="timestamp-output" class="transcript-display monospace-font"></div>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer bg-light border-0 d-flex justify-content-end p-3"
                        style="border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;">
                        <button class="btn btn-outline-secondary btn-sm me-2" onclick="copyCurrentTab()">Copy to
                            Clipboard</button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/js/controllers/dashboard.js"></script>
</body>

</html>
