<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Transcripto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="assets/css/admin.css">
</head>

<body>

    <div id="adminWrapper" class="wrapper d-none">
        <nav id="mainSidebar" class="sidebar">
            <div class="sidebar-header">
                <img src="favicon.ico" width="30" class="me-2">
                <span class="fs-5 fw-bold text-white">Transcripto</span>
            </div>

            <ul class="nav flex-column mt-4">
                <li class="nav-item">
                    <a href="#" class="nav-link active">
                        <i class="bi bi-speedometer2"></i>
                        <span class="sidebar-text">Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link" onclick="adminController.refreshUsers()">
                        <i class="bi bi-people"></i>
                        <span class="sidebar-text">Users</span>
                    </a>
                </li>
                <li class="nav-item mt-5">
                    <a href="#" class="nav-link text-danger" onclick="adminController.logout()">
                        <i class="bi bi-box-arrow-left"></i>
                        <span class="sidebar-text">Sign Out</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div id="content">
            <div class="container-fluid p-0 mb-4">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <button type="button" id="sidebarCollapse" class="btn btn-white border shadow-sm rounded-3">
                            <i class="bi bi-list fs-4"></i>
                        </button>
                    </div>
                    <!-- <div class="col">
                        <h2 class="fw-bold mb-0">Command Center</h2>
                        <p class="text-muted small mb-0">Platform performance at a glance</p>
                    </div> -->
                    <div class="col-auto">
                        <span
                            class="badge bg-success-subtle text-success rounded-pill px-3 py-2 border border-success-subtle">
                            ● System Online
                        </span>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-2">
                <div class="col-xl-3 col-md-6">
                    <div class="card card-panel p-4">
                        <div class="kpi-label mb-2">Total Users</div>
                        <h2 id="stat-total-users" class="fw-bold mb-0">0</h2>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6">
                    <div class="card card-panel p-4">
                        <div class="kpi-label mb-2">Transcripts</div>
                        <h2 id="stat-total-transcripts" class="fw-bold mb-0 text-success">0</h2>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="card card-panel p-4">
                        <div class="kpi-label mb-2">Anonymous Leads</div>
                        <h2 id="stat-anon-users" class="fw-bold mb-0 text-warning">0</h2>
                        <!-- <p class="text-muted small mb-0">
                            <span id="stat-power-guests" class="text-danger fw-bold">0</span> hit 5-limit
                        </p> -->
                    </div>
                </div>
                <div class="col-xl-3 col-md-6">
                    <div class="card card-panel p-4">
                        <div class="kpi-label mb-2">Active Sessions</div>
                        <h2 id="stat-avg-sessions" class="fw-bold mb-0 text-primary">0</h2>
                    </div>
                </div>
                <!-- <div class="col-xl-3 col-md-6">
                    <div class="card card-panel p-4">
                        <div class="kpi-label mb-2">Infrastructure</div>
                        <h2 class="fw-bold mb-0 text-info">Healthy</h2>
                    </div>
                </div> -->
            </div>

            <div class="row g-4 mb-2">
                <div class="col-xl-4">
                    <div class="card card-panel p-4 h-100">
                        <h6 class="kpi-label mb-4">User Stickiness</h6>
                        <div class="text-center">
                            <div class="stickiness-num" id="stickiness-ratio">0%</div>
                            <p class="text-muted small">DAU / MAU Ratio</p>
                        </div>
                        <div class="mt-4">
                            <div class="progress rounded-pill" style="height: 10px;">
                                <div id="stickiness-bar" class="progress-bar bg-primary" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-xl-8">
                    <div class="card card-panel p-4 h-100">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h6 class="kpi-label mb-0" id="usage-label">Usage Trend</h6>
                            <select class="form-select form-select-sm w-auto rounded-pill border shadow-sm px-3"
                                id="usageRange" onchange="adminController.changeRange(this.value)">
                                <option value="daily">Daily</option>
                                <option value="weekly">Weekly</option>
                                <option value="monthly" selected>Monthly</option>
                                <option value="yearly">Yearly</option>
                            </select>
                        </div>
                        <div class="chart-container">
                            <canvas id="avgUsageChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card card-panel p-4 mb-4">
                <h6 class="kpi-label mb-4">Activity Volume (Last 30 Days)</h6>
                <div class="chart-container" style="height: 200px;">
                    <canvas id="dauTrendChart"></canvas>
                </div>
            </div>

            <div class="card card-panel border-0 shadow-sm overflow-hidden">
                <div class="card-header bg-white border-0 p-4 d-flex justify-content-between align-items-center">
                    <h6 class="kpi-label mb-0">Recent Registrations</h6>
                    <button class="btn btn-sm btn-primary rounded-pill px-4 shadow-sm"
                        onclick="adminController.refreshUsers()">
                        <i class="bi bi-arrow-clockwise me-1"></i> Refresh
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th>NAME</th>
                                <th>EMAIL</th>
                                <th>JOINED</th>
                                <th>STATUS</th>
                                <th class="text-end pe-4">ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body">
                            <tr>
                                <td colspan="5" class="text-center py-5">Loading data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="assets/js/services/adminService.js"></script>
    <script src="assets/js/controllers/adminController.js"></script>

    <script>
        document.getElementById('sidebarCollapse').addEventListener('click', function () {
            const sidebar = document.getElementById('mainSidebar');
            if (window.innerWidth > 991) {
                sidebar.classList.toggle('collapsed');
            } else {
                sidebar.classList.toggle('mobile-open');
            }
            // Trigger resize for Chart.js
            setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 300);
        });
    </script>
</body>

</html>
