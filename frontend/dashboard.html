<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Transcripto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

    <div class="app-container">
        <aside id="sidebar">
            <div class="p-4">
                <a class="navbar-brand fw-bold text-primary fs-4" href="index.html">Transcripto</a>
            </div>
            <div class="sidebar-header">Recent History</div>
            <div id="history-list" class="list-group list-group-flush"></div>
        </aside>

        <div id="main-content">
            <nav class="navbar navbar-expand-lg bg-white border-bottom py-3 px-4">
                <div class="container-fluid">
                    <span class="text-muted">Welcome back, <span id="user-display-name" class="fw-bold text-dark">User</span></span>
                    <div class="ms-auto">
                        <button id="logout-btn" class="btn btn-outline-danger btn-sm rounded-pill px-3">Logout</button>
                    </div>
                </div>
            </nav>

            <main class="container py-5">
                <div class="row justify-content-center">
                    <div class="col-xl-10 col-12">

                        <div class="text-center mb-5">
                            <h1 class="fw-bold mb-3">YouTube to Text</h1>
                            <div class="input-group input-group-lg shadow-sm mx-auto" style="max-width: 700px; border-radius: 50px; overflow: hidden;">
                                <input type="text" id="video-id" class="form-control border-0 ps-4" placeholder="Paste YouTube link here...">
                                <button class="btn btn-primary px-4 fw-bold" id="fetch-btn">Extract</button>
                            </div>
                        </div>

                        <div id="video-player-section" class="d-none mb-4 text-center">
                            <div class="video-wrapper shadow-lg">
                                <div id="player"></div>
                            </div>
                        </div>

                        <div id="result-workspace" class="card border-0 shadow-lg d-none" style="border-radius: 20px;">
                            <div class="card-header bg-white border-bottom-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                                <ul class="nav nav-pills" id="transcriptTabs" role="tablist">
                                    <li class="nav-item">
                                        <button class="nav-link active fw-bold me-2" id="plain-tab" data-bs-toggle="pill" data-bs-target="#plain-view">Clean Transcript</button>
                                    </li>
                                    <li class="nav-item">
                                        <button class="nav-link fw-bold" id="timestamp-tab" data-bs-toggle="pill" data-bs-target="#timestamp-view">Video Timestamps</button>
                                    </li>
                                </ul>

                                <div class="d-flex align-items-center">
                                    <button class="btn btn-link text-muted me-3 text-decoration-none fw-medium p-0" onclick="copyCurrentTab()">
                                        <i class="bi bi-clipboard"></i> Copy
                                    </button>
                                    <button class="btn btn-primary btn-sm px-4 fw-bold shadow-sm" id="download-btn" onclick="downloadCurrentTab()">
                                        Download .txt
                                    </button>
                                </div>
                            </div>

                            <div class="card-body p-4 pt-2">
                                <div id="loader-section" class="d-none text-center py-5">
                                    <div class="spinner-pulse mx-auto mb-3"></div>
                                    <p class="text-muted fw-bold">Transcribing video...</p>
                                </div>

                                <div id="content-section">
                                    <div class="tab-content">
                                        <div class="tab-pane fade show active" id="plain-view">
                                            <div id="transcript-output" class="transcript-display"></div>
                                        </div>
                                        <div class="tab-pane fade" id="timestamp-view">
                                            <div id="timestamp-output" class="transcript-display monospace-font"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="assets/js/controllers/dashboard.js"></script>
</body>
</html>
