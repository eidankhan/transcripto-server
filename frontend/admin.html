<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Transcripto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">Transcripto Admin</a>
            <a href="dashboard.html" class="btn btn-outline-light btn-sm">Exit Admin</a>
        </div>
    </nav>

    <main class="container mb-5">
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="card p-4 border-0 h-100">
                    <h5 class="fw-bold mb-4">User Growth (Last 30 Days)</h5>
                    <canvas id="growthChart" height="100"></canvas>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 border-0 bg-primary text-white h-100">
                    <h5 class="fw-bold">Quick Stats</h5>
                    <div class="mt-4">
                        <h2 id="total-users">0</h2>
                        <p class="small opacity-75">Total Registered Users</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card p-4 border-0">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0">User Directory</h5>
                <button class="btn btn-primary btn-sm" onclick="refreshUsers()">Refresh List</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Joined</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/js/controllers/admin.js"></script>
</body>
</html>
