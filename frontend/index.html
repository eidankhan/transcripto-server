<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcripto | YouTube to Text</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Transcripto</a>
            <div class="ms-auto">
                <a href="login.html" class="btn btn-outline-light btn-sm me-2">Login</a>
                <a href="signup.html" class="btn btn-primary btn-sm">Get Started</a>
            </div>
        </div>
    </nav>

    <main class="container py-5 text-center mt-5">
        <h1 class="display-4 fw-bold text-primary">Stop Watching. Start Reading.</h1>
        <p class="lead text-muted mb-4">The simplest way to extract transcripts from YouTube videos.</p>
        <a href="signup.html" class="btn btn-primary btn-lg px-5 shadow">Try it Now</a>
    </main>

    <footer class="fixed-bottom bg-white border-top py-3 text-center text-muted">
        <small>&copy; 2026 Transcripto | Written by Eidan Khan</small>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="config.js"></script>
    <script>
        /**
         * @author Eidan Khan
         */
        $(document).ready(function () {
            // Check if the user is already authenticated
            const token = localStorage.getItem('access_token');

            if (token) {
                console.log("Authenticated user detected. Redirecting to dashboard...");
                window.location.href = 'dashboard.html';
            } else {
                console.log("Guest user. Connected to API at:", CONFIG.API_BASE_URL);
            }
        });
    </script>
</body>

</html>
