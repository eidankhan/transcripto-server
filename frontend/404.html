<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Transcripto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }

        .error-container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            background: white;
            border-radius: 15px;
            shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #0d6efd;
            line-height: 1;
        }
    </style>
</head>

<body>
    <div class="error-container shadow">
        <div class="error-code">404</div>
        <h2 class="mb-3">Lost in Transcription?</h2>
        <p class="text-muted mb-4">The page you're looking for doesn't exist or has moved. Let's get you back to your
            workspace.</p>
        <a href="index.html" class="btn btn-primary btn-lg px-5">Go Home</a>
    </div>
</body>

</html>
